<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reader App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #0f0f0f;
            color: #ffffff;
            padding-bottom: 100px;
        }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        .header { padding: 20px 0 30px; }
        .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .header p { color: #8e8e93; font-size: 15px; }

        .card {
            background: #1c1c1e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-image {
            width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 12px;
        }

        .card-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
        .card-subtitle { font-size: 13px; color: #8e8e93; margin-bottom: 10px; }
        .card-text { font-size: 15px; line-height: 1.5; }

        .badge {
            display: inline-block;
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
            margin-top: 10px; margin-right: 6px;
        }
        .badge-read { background: rgba(48, 209, 88, 0.2); color: #30d158; }
        .badge-bookmark { background: rgba(10, 132, 255, 0.2); color: #0a84ff; }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            background: #0a84ff; color: #fff;
            font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 12px;
        }
        .btn-secondary { background: #1c1c1e; color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        .input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: #0f0f0f; color: #fff; font-size: 15px; margin-bottom: 12px;
        }
        textarea.input { min-height: 100px; resize: vertical; }

        /* === ЯКОРНАЯ НАВИГАЦИЯ (ВСЕГДА ВИДНА) === */
        .bottom-nav {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            background: rgba(28, 28, 30, 0.98) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-top: 1px solid rgba(255,255,255,0.1) !important;
            display: flex !important;
            justify-content: space-around !important;
            padding: 12px 0 24px !important;
            z-index: 9999 !important;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3) !important;
        }

        .nav-btn {
            background: none !important;
            border: none !important;
            color: #8e8e93 !important;
            font-size: 11px !important;
            font-weight: 500 !important;
            cursor: pointer !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 4px !important;
            padding: 8px 20px !important;
            flex: 1 !important;
        }

        .nav-btn .icon { font-size: 22px !important; }
        .nav-btn.active { color: #0a84ff !important; }

        /* СЕКЦИИ */
        .section { display: none; }
        .section.active { display: block; }

        /* ЧИТАЛКА */
        .reader-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0f0f0f; z-index: 1000;
            display: none; flex-direction: column;
        }
        .reader-overlay.active { display: flex; }
        
        .reader-header {
            padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 12px;
        }
        .reader-content {
            flex: 1; overflow-y: auto; padding: 24px 20px 40px;
            font-size: 18px; line-height: 1.7; white-space: pre-wrap;
        }
        .reader-actions {
            padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 12px; background: #1c1c1e;
        }

        .hidden { display: none !important; }
        .loader { text-align: center; padding: 40px; color: #8e8e93; }
        .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 24px 0; }
    </style>
</head>
<body>

    <!-- ЛЕНТА -->
    <div id="section-feed" class="section active">
        <div class="container">
            <div class="header">
                <h1>Новости</h1>
                <p>Последние обновления</p>
            </div>
            <div id="feed-container"><div class="loader">Загрузка...</div></div>
        </div>
    </div>

    <!-- КНИГИ -->
    <div id="section-books" class="section">
        <div class="container">
            <div class="header">
                <h1>Библиотека</h1>
                <p>Твоя коллекция</p>
            </div>
            <div id="books-container"><div class="loader">Загрузка...</div></div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="section-profile" class="section">
        <div class="container">
            <div class="header">
                <h1>Профиль</h1>
                <p>Статистика</p>
            </div>
            
            <div class="card" style="display: flex; justify-content: space-around; text-align: center; padding: 24px;">
                <div>
                    <div style="font-size: 28px; font-weight: 700; color: #30d158;" id="stats-read">0</div>
                    <div style="font-size: 13px; color: #8e8e93; margin-top: 4px;">Прочитано</div>
                </div>
                <div style="width: 1px; background: rgba(255,255,255,0.1);"></div>
                <div>
                    <div style="font-size: 28px; font-weight: 700; color: #0a84ff;" id="stats-bookmarks">0</div>
                    <div style="font-size: 13px; color: #8e8e93; margin-top: 4px;">Закладки</div>
                </div>
            </div>

            <button class="btn btn-secondary" id="admin-login-btn">🔐 Панель автора</button>
            
            <div id="admin-panel" class="hidden">
                <div class="divider"></div>
                <h3 style="margin-bottom: 16px;">Добавить новость</h3>
                <input type="text" id="post-title" class="input" placeholder="Заголовок">
                <input type="text" id="post-img" class="input" placeholder="Ссылка на картинку">
                <textarea id="post-text" class="input" placeholder="Текст..."></textarea>
                <button class="btn" id="btn-add-post">Опубликовать</button>

                <div class="divider"></div>
                <h3 style="margin-bottom: 16px;">Добавить книгу</h3>
                <input type="text" id="book-title" class="input" placeholder="Название">
                <input type="text" id="book-author" class="input" placeholder="Автор">
                <input type="text" id="book-cover" class="input" placeholder="Обложка (URL)">
                <textarea id="book-text" class="input" placeholder="Текст..."></textarea>
                <button class="btn" id="btn-add-book">Добавить</button>
            </div>
        </div>
    </div>

    <!-- ЧИТАЛКА -->
    <div id="reader-overlay" class="reader-overlay">
        <div class="reader-header">
            <button class="btn btn-secondary" style="width: auto; padding: 8px 16px; margin: 0;" id="close-reader-btn">← Назад</button>
            <div style="flex: 1;">
                <div id="reader-title" style="font-weight: 600;"></div>
                <div id="reader-author" style="font-size: 13px; color: #8e8e93;"></div>
            </div>
        </div>
        <div id="reader-text" class="reader-content"></div>
        <div class="reader-actions">
            <button class="btn btn-secondary" id="btn-bookmark" style="margin: 0; flex: 1;">🔖 Закладка</button>
            <button class="btn" id="btn-read" style="margin: 0; flex: 1;">✅ Прочитано</button>
        </div>
    </div>

    <!-- === ЯКОРНАЯ НАВИГАЦИЯ (ВСЕГДА ВИДНА) === -->
    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('feed')">
            <span class="icon">🏠</span>
            <span>Лента</span>
        </button>
        <button class="nav-btn" onclick="switchTab('books')">
            <span class="icon">📚</span>
            <span>Книги</span>
        </button>
        <button class="nav-btn" onclick="switchTab('profile')">
            <span class="icon">👤</span>
            <span>Профиль</span>
        </button>
    </nav>

    <!-- FIREBASE + ЛОГИКА -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfrRE3nCFmodNEPac_plnoBuc_NvJbIgQ",
            authDomain: "book-2b50d.firebaseapp.com",
            databaseURL: "https://book-2b50d-default-rtdb.firebaseio.com",
            projectId: "book-2b50d",
            storageBucket: "book-2b50d.firebasestorage.app",
            messagingSenderId: "461145405797",
            appId: "1:461145405797:web:ca65bb4b7f457d6b25098c"
        };

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log('✅ Firebase подключен');
        } catch (e) {
            console.error('❌ Firebase ошибка:', e);
        }

        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные
        let postsData = [];
        let booksData = [];
        let readBooks = JSON.parse(localStorage.getItem('sr_read') || '[]');
        let bookmarkedBooks = JSON.parse(localStorage.getItem('sr_bookmarks') || '[]');
        let currentBookId = null;

        // === ГЛОБАЛЬНАЯ ФУНКЦИЯ ПЕРЕКЛЮЧЕНИЯ (РАБОТАЕТ ВСЕГДА) ===
        window.switchTab = function(tabName) {
            // Скрываем все секции
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            // Показываем нужную
            document.getElementById('section-' + tabName).classList.add('active');
            
            // Обновляем кнопки
            document.querySelectorAll('.nav-btn').forEach((btn, index) => {
                btn.classList.remove('active');
                if ((tabName === 'feed' && index === 0) || 
                    (tabName === 'books' && index === 1) || 
                    (tabName === 'profile' && index === 2)) {
                    btn.classList.add('active');
                }
            });
            
            // Вибрация
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        // === FIREBASE ===
        if (db) {
            onValue(ref(db, 'posts'), (snapshot) => {
                const data = snapshot.val();
                postsData = data ? Object.values(data).sort((a, b) => b.createdAt - a.createdAt) : [];
                renderFeed();
            }, (error) => {
                console.error('Ошибка чтения posts:', error);
                document.getElementById('feed-container').innerHTML = '<div class="card">Ошибка загрузки. Проверьте правила Firebase.</div>';
            });

            onValue(ref(db, 'books'), (snapshot) => {
                const data = snapshot.val();
                booksData = data ? Object.values(data).sort((a, b) => b.createdAt - a.createdAt) : [];
                renderBooks();
            }, (error) => {
                console.error('Ошибка чтения books:', error);
                document.getElementById('books-container').innerHTML = '<div class="card">Ошибка загрузки.</div>';
            });
        } else {
            document.getElementById('feed-container').innerHTML = '<div class="card">Firebase не подключен</div>';
            document.getElementById('books-container').innerHTML = '<div class="card">Firebase не подключен</div>';
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            if (!postsData.length) {
                container.innerHTML = '<div class="card" style="text-align:center; padding:40px; color:#8e8e93">Пока нет новостей</div>';
                return;
            }
            container.innerHTML = postsData.map(post => `
                <div class="card">
                    ${post.image ? `<img src="${post.image}" class="card-image">` : ''}
                    <div class="card-title">${post.title}</div>
                    <div class="card-text">${post.text}</div>
                </div>
            `).join('');
        }

        function renderBooks() {
            const container = document.getElementById('books-container');
            if (!booksData.length) {
                container.innerHTML = '<div class="card" style="text-align:center; padding:40px; color:#8e8e93">Библиотека пуста</div>';
                return;
            }
            container.innerHTML = booksData.map(book => {
                const isRead = readBooks.includes(book.id);
                const isBookmarked = bookmarkedBooks.includes(book.id);
                return `
                <div class="card" onclick="openBook('${book.id}')" style="cursor:pointer;">
                    ${book.coverImage ? `<img src="${book.coverImage}" class="card-image">` : ''}
                    <div class="card-title">${book.title}</div>
                    <div class="card-subtitle">${book.author}</div>
                    ${isRead ? '<span class="badge badge-read">✓ Прочитано</span>' : ''}
                    ${isBookmarked ? '<span class="badge badge-bookmark">🔖 Закладка</span>' : ''}
                </div>
            `}).join('');
            
            document.getElementById('stats-read').textContent = readBooks.length;
            document.getElementById('stats-bookmarks').textContent = bookmarkedBooks.length;
        }

        // === ЧИТАЛКА ===
        window.openBook = function(id) {
            currentBookId = id;
            const book = booksData.find(b => b.id === id);
            if (!book) return;
            
            document.getElementById('reader-title').textContent = book.title;
            document.getElementById('reader-author').textContent = book.author;
            document.getElementById('reader-text').textContent = book.text;
            document.getElementById('reader-overlay').classList.add('active');
            
            tg.BackButton.show();
            tg.BackButton.onClick(() => closeReader());
        };

        window.closeReader = function() {
            document.getElementById('reader-overlay').classList.remove('active');
            tg.BackButton.hide();
            renderBooks();
        };

        document.getElementById('close-reader-btn').onclick = window.closeReader;

        document.getElementById('btn-read').onclick = function() {
            if (!readBooks.includes(currentBookId)) {
                readBooks.push(currentBookId);
                localStorage.setItem('sr_read', JSON.stringify(readBooks));
                tg.showPopup({ title: 'Готово!', message: 'Отмечено как прочитанное', buttons: [{type: 'ok'}] });
                renderBooks();
            }
        };

        document.getElementById('btn-bookmark').onclick = function() {
            const idx = bookmarkedBooks.indexOf(currentBookId);
            if (idx > -1) {
                bookmarkedBooks.splice(idx, 1);
                tg.showAlert('Удалено из закладок');
            } else {
                bookmarkedBooks.push(currentBookId);
                tg.showPopup({ title: 'Сохранено', message: 'Добавлено в закладки', buttons: [{type: 'ok'}] });
            }
            localStorage.setItem('sr_bookmarks', JSON.stringify(bookmarkedBooks));
        };

        // === АДМИН ===
        document.getElementById('admin-login-btn').onclick = function() {
            const pwd = prompt("Пароль:");
            if (pwd === "admin123") {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-panel').scrollIntoView({ behavior: 'smooth' });
            } else if (pwd) {
                tg.showAlert('Неверный пароль');
            }
        };

        document.getElementById('btn-add-post').onclick = function() {
            const title = document.getElementById('post-title').value;
            const img = document.getElementById('post-img').value;
            const text = document.getElementById('post-text').value;
            
            if (!title || !text) return tg.showAlert('Заполни поля');
            
            if (!db) return tg.showAlert('Firebase не подключен');
            
            push(ref(db, 'posts'), { title, image: img, text, createdAt: Date.now() })
                .then(() => {
                    document.getElementById('post-title').value = '';
                    document.getElementById('post-img').value = '';
                    document.getElementById('post-text').value = '';
                    tg.showPopup({ title: 'Опубликовано!', message: 'Новость видна всем', buttons: [{type: 'ok'}] });
                })
                .catch(err => tg.showAlert('Ошибка: ' + err.message));
        };

        document.getElementById('btn-add-book').onclick = function() {
            const title = document.getElementById('book-title').value;
            const author = document.getElementById('book-author').value;
            const cover = document.getElementById('book-cover').value;
            const text = document.getElementById('book-text').value;
            
            if (!title || !text) return tg.showAlert('Заполни поля');
            
            if (!db) return tg.showAlert('Firebase не подключен');
            
            push(ref(db, 'books'), {
                id: Date.now().toString(),
                title, author: author || "Неизвестен", coverImage: cover, text, createdAt: Date.now()
            })
                .then(() => {
                    document.getElementById('book-title').value = '';
                    document.getElementById('book-author').value = '';
                    document.getElementById('book-cover').value = '';
                    document.getElementById('book-text').value = '';
                    tg.showPopup({ title: 'Добавлено!', message: 'Книга в библиотеке', buttons: [{type: 'ok'}] });
                })
                .catch(err => tg.showAlert('Ошибка: ' + err.message));
        };

        // Инициализация
        console.log('✅ Приложение запущено');
    </script>
</body>
</html>
